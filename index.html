<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client-Side Image Tool (ZIP Output)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            font-family: 'Calibri', sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 750px;
            background: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 12px;
            padding: 30px;
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            font-size: 26px;
            color: #2c3e50;
            margin-bottom: 25px;
        }
        .tabs {
            display: flex;
            justify-content: space-around;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 25px;
        }
        .tab-btn {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            background: none;
            border: none;
            cursor: pointer;
            color: #7f8c8d;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            color: #3498db;
            border-bottom: 3px solid #3498db;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        label {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        input[type="file"] {
            display: none;
        }
        .file-upload-btn {
            background-color: #3498db;
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .file-upload-btn:hover { background-color: #2980b9; }
        .merge-btn-color { background-color: #e67e22; }
        .merge-btn-color:hover { background-color: #d35400; }
        
        .file-status {
            font-size: 13px;
            font-style: italic;
            color: #7f8c8d;
            margin-top: 5px;
            text-align: center;
            max-height: 120px;
            overflow-y: auto;
            width: 80%;
            border: 1px solid #eee;
            border-radius: 5px;
            padding: 8px;
            display: none;
            white-space: pre-line;
            background: #fafafa;
        }
        input[type="number"] {
            width: 100px;
            height: 35px;
            font-size: 15px;
            text-align: center;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            font-family: 'Calibri', sans-serif;
        }
        .radio-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            margin-top: 5px;
        }
        .radio-option {
            display: flex;
            align-items: center;
            font-size: 15px;
            cursor: pointer;
        }
        .radio-option input { margin-right: 8px; }
        
        .action-btn {
            width: 80%;
            height: 50px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .btn-split { background-color: #2ecc71; }
        .btn-split:hover { background-color: #27ae60; }
        .btn-merge { background-color: #e67e22; }
        .btn-merge:hover { background-color: #d35400; }

        .loading-text {
            color: #7f8c8d;
            font-size: 14px;
            margin-top: 10px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Universal Client-Side Image Tool</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('split-tab')">✂️ Split Long Image</button>
        <button class="tab-btn" onclick="switchTab('merge-tab')">🔗 Merge & Redistribute Images</button>
    </div>

    <div id="split-tab" class="tab-content active">
        <div class="form-group">
            <label for="split-input" class="file-upload-btn">📁 Select Long Image to Split</label>
            <!-- تم تعديل حقل الاختيار هنا ليفتح مدير الملفات مباشرة بدلاً من الاستوديو -->
            <input type="file" id="split-input" accept=".png,.jpg,.jpeg,.webp,.bmp">
            <div id="split-status" class="file-status">No image selected yet</div>
        </div>

        <div class="form-group">
            <label>Required Number of Pieces:</label>
            <input type="number" id="split-pieces" value="5" min="1">
        </div>

        <div class="form-group">
            <label>Output Files Naming Method:</label>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="split-naming" value="numeric"> Numbers only (e.g., 1.png, 2.png)</label>
                <label class="radio-option"><input type="radio" name="split-naming" value="basic" checked> Original name + Number (e.g., image_part_1.png)</label>
            </div>
        </div>

        <div class="form-group">
            <button id="btn-split-action" class="action-btn btn-split" onclick="processSplit()">🚀 Start Splitting Process</button>
            <div id="split-loading" class="loading-text">Processing and creating ZIP file... Please wait.</div>
        </div>
    </div>

    <div id="merge-tab" class="tab-content">
        <div class="form-group">
            <label for="merge-input" class="file-upload-btn merge-btn-color">📁 Select Images in Order</label>
            <!-- تم تعديل حقل الاختيار المتعدد هنا ليفتح مدير الملفات مباشرة بدلاً من الاستوديو -->
            <input type="file" id="merge-input" accept=".png,.jpg,.jpeg,.webp,.bmp" multiple>
            <div id="merge-status" class="file-status">No images selected yet.</div>
        </div>

        <div class="form-group">
            <label>Number of Final Output Files Required:</label>
            <input type="number" id="merge-outputs" value="20" min="1">
        </div>

        <div class="form-group">
            <label>Output Files Naming Method:</label>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="merge-naming" value="numeric"> Numbers only (e.g., 1.png, 2.png)</label>
                <label class="radio-option"><input type="radio" name="merge-naming" value="basic" checked> First file name + Number (e.g., output_1.png)</label>
            </div>
        </div>

        <div class="form-group">
            <button id="btn-merge-action" class="action-btn btn-merge" onclick="processMerge()">🔗 Start Merging & Redistribution Now</button>
            <div id="merge-loading" class="loading-text">Merging, splitting, and packing into ZIP... Please wait.</div>
        </div>
    </div>
</div>

<script>
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    const splitInput = document.getElementById('split-input');
    const splitStatus = document.getElementById('split-status');
    splitInput.addEventListener('change', () => {
        if(splitInput.files.length > 0) {
            splitStatus.innerText = splitInput.files[0].name;
            splitStatus.style.display = 'block';
        }
    });

    const mergeInput = document.getElementById('merge-input');
    const mergeStatus = document.getElementById('merge-status');
    mergeInput.addEventListener('change', () => {
        if(mergeInput.files.length > 0) {
            let fileNames = Array.from(mergeInput.files).map((f, i) => `[${i+1}] ${f.name}`).join('\n');
            mergeStatus.innerText = fileNames;
            mergeStatus.style.display = 'block';
        }
    });

    function naturalSort(files) {
        const collator = new Intl.Collator(undefined, {numeric: true, sensitivity: 'base'});
        return Array.from(files).sort((a, b) => collator.compare(a.name, b.name));
    }

    function loadImage(file) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = URL.createObjectURL(file);
        });
    }

    function canvasToBlob(canvas) {
        return new Promise((resolve) => {
            canvas.toBlob((blob) => resolve(blob), 'image/png');
        });
    }

    function downloadZipFile(blob, filename) {
        const link = document.createElement('a');
        link.download = filename;
        link.href = URL.createObjectURL(blob);
        link.click();
    }

    async function processSplit() {
        if (splitInput.files.length === 0) {
            alert("Please select a long image first!");
            return;
        }
        const numPieces = parseInt(document.getElementById('split-pieces').value);
        if (isNaN(numPieces) || numPieces <= 0) {
            alert("Please enter a valid positive number for pieces!");
            return;
        }

        const btn = document.getElementById('btn-split-action');
        const loading = document.getElementById('split-loading');
        btn.disabled = true;
        loading.style.display = 'block';

        try {
            const file = splitInput.files[0];
            const img = await loadImage(file);
            const width = img.width;
            const height = img.height;
            const pieceHeight = Math.floor(height / numPieces);
            
            const originalName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            const namingMethod = document.querySelector('input[name="split-naming"]:checked').value;

            const zip = new JSZip();
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = width;

            for (let i = 0; i < numPieces; i++) {
                let top = i * pieceHeight;
                let bottom = (i === numPieces - 1) ? height : (i + 1) * pieceHeight;
                
                let currentPieceHeight = bottom - top;
                canvas.height = currentPieceHeight;

                ctx.drawImage(img, 0, top, width, currentPieceHeight, 0, 0, width, currentPieceHeight);

                let outputName = (namingMethod === "numeric") ? `${i+1}.png` : `${originalName}_part_${i+1}.png`;
                
                const imageBlob = await canvasToBlob(canvas);
                zip.file(outputName, imageBlob);
            }

            const zipContent = await zip.generateAsync({type: "blob"});
            downloadZipFile(zipContent, `${originalName}_split_pieces.zip`);
            
            alert("Success! All pieces have been generated and downloaded inside one ZIP file.");
        } catch (e) {
            alert("An error occurred during splitting: " + e.message);
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }

    async function processMerge() {
        if (mergeInput.files.length === 0) {
            alert("Please select images to merge first!");
            return;
        }
        const numOutputs = parseInt(document.getElementById('merge-outputs').value);
        if (isNaN(numOutputs) || numOutputs <= 0) {
            alert("Please enter a valid number of output files!");
            return;
        }

        const btn = document.getElementById('btn-merge-action');
        const loading = document.getElementById('merge-loading');
        btn.disabled = true;
        loading.style.display = 'block';

        try {
            const sortedFiles = naturalSort(mergeInput.files);
            const openedImages = [];
            
            for (let file of sortedFiles) {
                const img = await loadImage(file);
                openedImages.push(img);
            }
            
            const maxWidth = Math.max(...openedImages.map(img => img.width));
            
            let totalHeight = 0;
            const imageRenderData = [];

            for (let img of openedImages) {
                let aspectRatio = img.height / img.width;
                let newHeight = Math.floor(maxWidth * aspectRatio);
                imageRenderData.push({ img, height: newHeight });
                totalHeight += newHeight;
            }

            const mainCanvas = document.createElement('canvas');
            mainCanvas.width = maxWidth;
            mainCanvas.height = totalHeight;
            const mainCtx = mainCanvas.getContext('2d');

            let currentY = 0;
            for (let data of imageRenderData) {
                mainCtx.drawImage(data.img, 0, currentY, maxWidth, data.height);
                currentY += data.height;
            }

            const pieceHeight = Math.floor(totalHeight / numOutputs);
            const firstFileName = sortedFiles[0].name.substring(0, sortedFiles[0].name.lastIndexOf('.')) || sortedFiles[0].name;
            const namingMethod = document.querySelector('input[name="merge-naming"]:checked').value;

            const zip = new JSZip();
            const sliceCanvas = document.createElement('canvas');
            sliceCanvas.width = maxWidth;
            const sliceCtx = sliceCanvas.getContext('2d');

            for (let i = 0; i < numOutputs; i++) {
                let top = i * pieceHeight;
                let bottom = (i === numOutputs - 1) ? totalHeight : (i + 1) * pieceHeight;
                let currentPieceHeight = bottom - top;

                sliceCanvas.height = currentPieceHeight;
                sliceCtx.drawImage(mainCanvas, 0, top, maxWidth, currentPieceHeight, 0, 0, maxWidth, currentPieceHeight);

                let outputName = (namingMethod === "numeric") ? `${i+1}.png` : `${firstFileName}_part_${i+1}.png`;
                
                const imageBlob = await canvasToBlob(sliceCanvas);
                zip.file(outputName, imageBlob);
            }

            const zipContent = await zip.generateAsync({type: "blob"});
            downloadZipFile(zipContent, `${firstFileName}_redistributed_output.zip`);

            alert("Success! Images merged, redistributed and downloaded inside one ZIP file.");
        } catch (e) {
            alert("An error occurred during merging: " + e.message);
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }
</script>

</body>
</html>
